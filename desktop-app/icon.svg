<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  
  <!-- Calculator Body -->
  <rect x="80" y="60" width="352" height="392" rx="30" fill="#1e293b" stroke="#334155" stroke-width="4"/>
  
  <!-- Screen -->
  <rect x="100" y="80" width="312" height="100" rx="15" fill="url(#screen)"/>
  
  <!-- Display Text -->
  <text x="390" y="145" font-family="monospace" font-size="48" fill="#10b981" text-anchor="end" font-weight="bold">501</text>
  <text x="390" y="165" font-family="sans-serif" font-size="14" fill="#64748b" text-anchor="end">formulas</text>
  
  <!-- Calculator Buttons Grid -->
  <!-- Row 1 -->
  <rect x="100" y="200" width="65" height="50" rx="10" fill="#ef4444" opacity="0.8"/>
  <rect x="180" y="200" width="65" height="50" rx="10" fill="#475569"/>
  <rect x="260" y="200" width="65" height="50" rx="10" fill="#475569"/>
  <rect x="340" y="200" width="72" height="50" rx="10" fill="#f59e0b" opacity="0.8"/>
  
  <!-- Row 2 -->
  <rect x="100" y="260" width="65" height="50" rx="10" fill="#334155"/>
  <rect x="180" y="260" width="65" height="50" rx="10" fill="#334155"/>
  <rect x="260" y="260" width="65" height="50" rx="10" fill="#334155"/>
  <rect x="340" y="260" width="72" height="50" rx="10" fill="#f59e0b" opacity="0.8"/>
  
  <!-- Row 3 -->
  <rect x="100" y="320" width="65" height="50" rx="10" fill="#334155"/>
  <rect x="180" y="320" width="65" height="50" rx="10" fill="#334155"/>
  <rect x="260" y="320" width="65" height="50" rx="10" fill="#334155"/>
  <rect x="340" y="320" width="72" height="50" rx="10" fill="#f59e0b" opacity="0.8"/>
  
  <!-- Row 4 -->
  <rect x="100" y="380" width="145" height="50" rx="10" fill="#334155"/>
  <rect x="260" y="380" width="65" height="50" rx="10" fill="#334155"/>
  <rect x="340" y="380" width="72" height="50" rx="10" fill="#3b82f6"/>
  
  <!-- Button Labels -->
  <text x="132" y="232" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">C</text>
  <text x="212" y="232" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle">±</text>
  <text x="292" y="232" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle">%</text>
  <text x="376" y="232" font-family="sans-serif" font-size="24" fill="white" text-anchor="middle">÷</text>
  
  <text x="132" y="292" font-family="sans-serif" font-size="22" fill="white" text-anchor="middle">7</text>
  <text x="212" y="292" font-family="sans-serif" font-size="22" fill="white" text-anchor="middle">8</text>
  <text x="292" y="292" font-family="sans-serif" font-size="22" fill="white" text-anchor="middle">9</text>
  <text x="376" y="292" font-family="sans-serif" font-size="24" fill="white" text-anchor="middle">×</text>
  
  <text x="132" y="352" font-family="sans-serif" font-size="22" fill="white" text-anchor="middle">4</text>
  <text x="212" y="352" font-family="sans-serif" font-size="22" fill="white" text-anchor="middle">5</text>
  <text x="292" y="352" font-family="sans-serif" font-size="22" fill="white" text-anchor="middle">6</text>
  <text x="376" y="352" font-family="sans-serif" font-size="24" fill="white" text-anchor="middle">−</text>
  
  <text x="172" y="412" font-family="sans-serif" font-size="22" fill="white" text-anchor="middle">0</text>
  <text x="292" y="412" font-family="sans-serif" font-size="22" fill="white" text-anchor="middle">.</text>
  <text x="376" y="412" font-family="sans-serif" font-size="24" fill="white" text-anchor="middle" font-weight="bold">=</text>
  
  <!-- AI Badge -->
  <circle cx="432" cy="80" r="35" fill="#ec4899"/>
  <text x="432" y="88" font-family="sans-serif" font-size="24" fill="white" text-anchor="middle" font-weight="bold">AI</text>
</svg>
